  deploy_vercel:
    name: Deploy Vercel Production
    runs-on: ubuntu-latest
    needs: migrate_supabase
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          package-manager-cache: false

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Ensure no stale Vercel link
        run: rm -rf .vercel

      - name: Link Vercel project (non-interactive)
        run: npx vercel link --yes --project bcms-web --scope kosids-projects --token "${{ secrets.VERCEL_TOKEN }}"

      - name: Pull Vercel project settings
        run: npx vercel pull --yes --environment=production --scope kosids-projects --token "${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel artifacts
        run: npx vercel build --prod --token "${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to Vercel (production)
        run: npx vercel deploy --prebuilt --prod --token "${{ secrets.VERCEL_TOKEN }}"
