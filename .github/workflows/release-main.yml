name: Release Main

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  verify:
    name: Verify Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          package-manager-cache: false
      - run: pnpm install --frozen-lockfile
      - run: pnpm -C apps/web lint
      - run: pnpm -C apps/web test
      - run: pnpm build

  migrate_supabase:
    name: Migrate Supabase
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: 2.95.2
      - name: Validate DB URL secret
        run: |
          if [ -z "${{ secrets.SUPABASE_DB_URL }}" ]; then
            echo "Missing SUPABASE_DB_URL secret"
            exit 1
          fi
      - name: Push migrations
        run: supabase db push --workdir ./supabase --db-url "${{ secrets.SUPABASE_DB_URL }}"