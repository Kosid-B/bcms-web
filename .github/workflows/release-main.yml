name: Release Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  verify:
    name: Verify Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -C apps/web lint

      - name: Build
        run: pnpm build

  migrate_supabase:
    name: Migrate Supabase
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.95.2

      - name: Validate Supabase DB URL secret
        run: |
          if [ -z "${{ secrets.SUPABASE_DB_URL }}" ]; then
            echo "Missing SUPABASE_DB_URL secret"
            exit 1
          fi

      - name: Push all migrations
        run: supabase db push --workdir ./supabase --db-url "${{ secrets.SUPABASE_DB_URL }}"

      - name: Verify BCP automate objects
        run: |
          supabase db query "select (to_regclass('public.continuity_strategies') is not null) as has_continuity_strategies, (to_regclass('public.continuity_procedure_steps') is not null) as has_continuity_procedure_steps, (to_regprocedure('public.generate_bcp_automate(uuid,uuid,text)') is not null) as has_generate_bcp_automate, (to_regprocedure('public.evaluate_bcp_readiness(uuid)') is not null) as has_evaluate_bcp_readiness;" --workdir ./supabase --db-url "${{ secrets.SUPABASE_DB_URL }}" -o csv

  deploy_vercel:
    name: Deploy Vercel Production
    runs-on: ubuntu-latest
    needs: migrate_supabase
    environment: production
    # กำหนดค่าตัวแปรระดับ Job เพื่อให้ทุก Step เรียกใช้ได้ทันที
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Ensure no stale Vercel link
        run: rm -rf .vercel

      - name: Pull Vercel project settings
        run: npx vercel pull --yes --environment=production --token "${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel artifacts
        run: npx vercel build --prod --token "${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to Vercel (production)
        run: npx vercel deploy --prebuilt --prod --token "${{ secrets.VERCEL_TOKEN }}"