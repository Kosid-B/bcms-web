deploy_vercel:
  name: Deploy Vercel Production
  runs-on: ubuntu-latest
  needs: migrate_supabase
  env:
    VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
    VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.33.2

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 22
        package-manager-cache: false

    - name: Install
      run: pnpm install --frozen-lockfile

    - name: Validate Vercel secrets
      run: |
        if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
          echo "Missing one or more Vercel secrets"
          exit 1
        fi

    - name: Ensure clean Vercel state
      run: rm -rf .vercel && mkdir -p .vercel

    - name: Write Vercel project binding
      run: |
        printf '{"orgId":"%s","projectId":"%s","projectName":"bcms-web"}\n' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > .vercel/project.json

    - name: Verify Vercel project binding file
      run: |
        test -f .vercel/project.json
        cat .vercel/project.json

    - name: Build Vercel artifacts
      run: npx vercel build --prod --yes --cwd . --token "${{ secrets.VERCEL_TOKEN }}"

    - name: Deploy to Vercel (production)
      run: npx vercel deploy --prebuilt --prod --yes --cwd . --token "${{ secrets.VERCEL_TOKEN }}"
