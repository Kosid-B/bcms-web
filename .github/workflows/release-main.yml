name: Release Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Verify Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build

  migrate_supabase:
    name: Migrate Supabase
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.95.2

      - name: Hard Reset Migration History
        # บังคับให้ DB เชื่อว่าทุกไฟล์ที่เคยมีปัญหา "รันเสร็จแล้ว" เพื่อไม่ให้มันรันซ้ำ
        run: |
          supabase migration repair --db-url 'postgresql://postgres:Yvsmi0O2CPMUX0wK@db.pbtngbwbieskvmutshbz.supabase.co:5432/postgres' --status completed 20260426 || true
          supabase migration repair --db-url 'postgresql://postgres:Yvsmi0O2CPMUX0wK@db.pbtngbwbieskvmutshbz.supabase.co:5432/postgres' --status completed 20260510 || true

      - name: Push migrations with skip
        # เมื่อซ่อมประวัติแล้ว เราจะสั่ง push โดยใช้ --include-all 
        # ถ้ามันยังพยายามจะบันทึกซ้ำ เราจะยอมให้มัน Error แล้วไปต่อเลย (เพราะเราซ่อมประวัติไปแล้ว)
        run: |
          supabase db push --db-url 'postgresql://postgres:Yvsmi0O2CPMUX0wK@db.pbtngbwbieskvmutshbz.supabase.co:5432/postgres' --include-all || echo "Migrations already in sync"

  deploy_vercel:
    name: Deploy Vercel Production
    runs-on: ubuntu-latest
    # เปลี่ยนมาใช้เงื่อนไข "always" หรือรันต่อแม้ migration จะแจ้งเตือน เพื่อให้เว็บออนไลน์ได้
    needs: migrate_supabase
    if: always()
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Pull Vercel Project Settings
        run: npx vercel pull --yes --environment=production --token "${{ secrets.VERCEL_TOKEN }}" --scope "${{ env.VERCEL_ORG_ID }}" --project "${{ env.VERCEL_PROJECT_ID }}"
      - name: Build Vercel Artifacts
        run: npx vercel build --prod --token "${{ secrets.VERCEL_TOKEN }}" --scope "${{ env.VERCEL_ORG_ID }}"
      - name: Deploy to Vercel
        run: npx vercel deploy --prebuilt --prod --token "${{ secrets.VERCEL_TOKEN }}" --scope "${{ env.VERCEL_ORG_ID }}"
