name: Release Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Verify Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build

  migrate_supabase:
    name: Migrate Supabase
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.95.2

      - name: Force Sync Migration
        # ใช้เทคนิคส่งไฟล์ทั้งหมดขึ้นไปโดยไม่สนใจประวัติที่หายไป (include-all)
        # พร้อมซ่อมแซมเวอร์ชัน 20260426 หากเกิดข้อผิดพลาด
        run: |
          supabase db push --db-url 'postgresql://postgres:Yvsmi0O2CPMUX0wK@db.pbtngbwbieskvmutshbz.supabase.co:5432/postgres' --include-all || \
          (supabase migration repair --db-url 'postgresql://postgres:Yvsmi0O2CPMUX0wK@db.pbtngbwbieskvmutshbz.supabase.co:5432/postgres' --status reverted 20260426 && \
           supabase db push --db-url 'postgresql://postgres:Yvsmi0O2CPMUX0wK@db.pbtngbwbieskvmutshbz.supabase.co:5432/postgres' --include-all)

      - name: Verify BCP automate objects
        run: |
          supabase db query "
          SELECT 
            (to_regclass('public.continuity_strategies') IS NOT NULL) as has_continuity_strategies,
            (to_regclass('public.continuity_procedure_steps') IS NOT NULL) as has_continuity_procedure_steps,
            (to_regprocedure('public.generate_bcp_automate(uuid,uuid,text)') IS NOT NULL) as has_generate_bcp_automate,
            (to_regprocedure('public.evaluate_bcp_readiness(uuid)') IS NOT NULL) as has_evaluate_bcp_readiness;
          " --db-url 'postgresql://postgres:Yvsmi0O2CPMUX0wK@db.pbtngbwbieskvmutshbz.supabase.co:5432/postgres' -o csv

  deploy_vercel:
    name: Deploy Vercel Production
    runs-on: ubuntu-latest
    needs: migrate_supabase
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Pull Vercel Project Settings
        run: npx vercel pull --yes --environment=production --token "${{ secrets.VERCEL_TOKEN }}" --scope "${{ env.VERCEL_ORG_ID }}" --project "${{ env.VERCEL_PROJECT_ID }}"
      - name: Build Vercel Artifacts
        run: npx vercel build --prod --token "${{ secrets.VERCEL_TOKEN }}" --scope "${{ env.VERCEL_ORG_ID }}"
      - name: Deploy to Vercel
        run: npx vercel deploy --prebuilt --prod --token "${{ secrets.VERCEL_TOKEN }}" --scope "${{ env.VERCEL_ORG_ID }}"
