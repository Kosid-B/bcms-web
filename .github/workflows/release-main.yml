name: Release Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  verify:
    name: Verify Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -C apps/web lint

      - name: Build
        run: pnpm build

  migrate_supabase:
    name: Migrate Supabase
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.95.2

      - name: Push all migrations
        run: supabase db push --workdir ./supabase --db-url "${{ secrets.SUPABASE_DB_URL }}"

  deploy_vercel:
    name: Deploy Vercel Production
    runs-on: ubuntu-latest
    needs: migrate_supabase
    environment: production
    env:
      # ใช้ค่า ID ที่คุณระบุมา (ใส่ไว้ใน GitHub Secrets)
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel Project Settings
        # แก้ปัญหา "Could not retrieve Project Settings" โดยการดึงไฟล์คอนฟิกมาสร้างใน Runner
        run: npx vercel pull --yes --environment=production --token "${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel Artifacts
        # เมื่อมีไฟล์จากการ Pull แล้ว ขั้นตอนนี้จะรู้จัก Project ทันที
        run: npx vercel build --prod --token "${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to Vercel
        # ส่งไฟล์ที่ Build เสร็จแล้วขึ้นไป (เสถียรและเร็วที่สุด)
        run: npx vercel deploy --prebuilt --prod --token "${{ secrets.VERCEL_TOKEN }}"
