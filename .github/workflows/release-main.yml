name: Release Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    name: Verify Web
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build

  migrate_supabase:
    name: Migrate Supabase
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.95.2
      - name: Sync and Repair
        run: |
          supabase migration repair --db-url 'postgresql://postgres:Yvsmi0O2CPMUX0wK@db.pbtngbwbieskvmutshbz.supabase.co:5432/postgres' --status completed 20260426 || true
          supabase migration repair --db-url 'postgresql://postgres:Yvsmi0O2CPMUX0wK@db.pbtngbwbieskvmutshbz.supabase.co:5432/postgres' --status completed 20260510 || true
      - name: Push migrations
        run: |
          supabase db push --db-url 'postgresql://postgres:Yvsmi0O2CPMUX0wK@db.pbtngbwbieskvmutshbz.supabase.co:5432/postgres' --include-all || echo "Already in sync"

  deploy_vercel:
    name: Deploy Vercel Production
    runs-on: ubuntu-latest
    needs: migrate_supabase
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        # เราจะไม่ระบุ --scope หรือ --project ในคำสั่งเลย
        # ระบบจะอ่านจากไฟล์ .vercel/project.json ที่เรา Force Push ขึ้นไปเอง
        run: |
          npx vercel pull --yes --environment=production --token "${{ secrets.VERCEL_TOKEN }}"
          npx vercel build --prod --token "${{ secrets.VERCEL_TOKEN }}"
          npx vercel deploy --prebuilt --prod --token "${{ secrets.VERCEL_TOKEN }}"